# Balitech Chat — Nginx WebSocket gateway (include inside your HTTPS server {})
#
# Requires: Node chat-ws on 127.0.0.1:8765, PHP app on same host.
# Set CHAT_WS_PUBLIC_PATH=/chat-ws and CHAT_WS_USE_TLS=true in config/chat_ws.php

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream balitech_chat_ws {
    least_conn;
    server 127.0.0.1:8765;
    keepalive 64;
}

location /chat-ws {
    proxy_pass http://balitech_chat_ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_buffering off;
}

# Internal publish from PHP (localhost only)
location /chat-ws-internal/ {
    allow 127.0.0.1;
    deny all;
    proxy_pass http://balitech_chat_ws/internal/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
}
