<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
    <style>
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h2>Attendance API Test - March 12, 2026</h2>
    <div id="result"></div>

    <script>
        async function testAPI() {
            try {
                const response = await fetch('/interview-forms/attendance/attendance-api.php?action=getLiveAttendance&date=2026-03-12');
                const data = await response.json();
                
                if (data.success) {
                    let html = '<table>';
                    html += '<tr><th>ID</th><th>Name</th><th>Department</th><th>First In</th><th>Last Out</th><th>Hours</th><th>Status</th></tr>';
                    
                    data.data.attendance.forEach(emp => {
                        html += `<tr>
                            <td>${emp.code}</td>
                            <td>${emp.name}</td>
                            <td>${emp.department}</td>
                            <td>${emp.first_in}</td>
                            <td>${emp.last_out}</td>
                            <td>${emp.working_hours}</td>
                            <td>${emp.status}</td>
                        </tr>`;
                    });
                    
                    html += '</table>';
                    document.getElementById('result').innerHTML = html;
                } else {
                    document.getElementById('result').innerHTML = 'Error: ' + data.message;
                }
            } catch (error) {
                document.getElementById('result').innerHTML = 'Error: ' + error.message;
            }
        }
        
        testAPI();
    </script>
</body>
</html>
