<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balitech · Reception Portal</title>
    <link rel="stylesheet" href="css/dropdown-fix.css">
    <link rel="stylesheet" href="css/portal-ui-polish.css?v=1">
    <link rel="stylesheet" href="css/reception-pro.css?v=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #f97316;
            --primary-dark: #ea580c;
            --primary-light: rgba(249, 115, 22, 0.15);
            --primary-glow: rgba(249, 115, 22, 0.4);
            --secondary: #10b981;
            --secondary-dark: #059669;
            --secondary-light: rgba(16, 185, 129, 0.15);
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --purple: #8b5cf6;
            --pink: #ec4899;
            --cyan: #06b6d4;
            --bg-dark: #0a0c15;
            --bg-darker: #05070f;
            --bg-card: rgba(30, 36, 54, 0.95);
            --bg-sidebar: #0f1524;
            --bg-hover: rgba(249, 115, 22, 0.1);
            --text-primary: #ffffff;
            --text-secondary: #e2e8f0;
            --text-muted: #94a3b8;
            --text-dim: #64748b;
            --border-light: rgba(255, 255, 255, 0.08);
            --border-primary: rgba(249, 115, 22, 0.25);
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            --shadow-xl: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 25px var(--primary-glow);
            --gradient-primary: linear-gradient(135deg, var(--primary), var(--primary-dark));
            --gradient-success: linear-gradient(135deg, var(--secondary), var(--secondary-dark));
        }

        [data-theme="light"] {
            --primary: #f97316;
            --primary-dark: #ea580c;
            --primary-light: rgba(249, 115, 22, 0.1);
            --bg-dark: #f8fafc;
            --bg-darker: #f1f5f9;
            --bg-card: #ffffff;
            --bg-sidebar: #1e293b;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-muted: #64748b;
            --border-light: rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(ellipse at 30% 40%, #0f0c29, #1a1a3e, #0a0a1a);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            z-index: -1;
            animation: floatOrb 20s ease-in-out infinite;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: var(--primary);
            top: -200px;
            left: -200px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: var(--primary-dark);
            bottom: -150px;
            right: -150px;
            animation-delay: 5s;
        }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, -50px) scale(1.1); }
            66% { transform: translate(-30px, 40px) scale(0.9); }
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-primary);
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            z-index: 100;
            overflow-y: auto;
            transition: all 0.3s;
        }

        .sidebar-header {
            padding: 28px 24px;
            border-bottom: 1px solid var(--border-light);
            text-align: center;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .sidebar-logo-icon {
            width: 48px;
            height: 48px;
            background: var(--gradient-primary);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            box-shadow: var(--shadow-glow);
        }

        .sidebar-logo-text h2 {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-logo-text p {
            font-size: 10px;
            color: var(--text-muted);
        }

        .sidebar-nav {
            padding: 24px 16px;
        }

        .nav-section-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 12px;
            padding-left: 12px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
            margin-bottom: 4px;
            cursor: pointer;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--primary-light);
            color: var(--primary);
            transform: translateX(5px);
        }

        .nav-badge {
            margin-left: auto;
            background: var(--gradient-primary);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
            color: white;
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid var(--border-light);
            margin-top: 20px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px;
            background: rgba(255,255,255,0.04);
            border-radius: 20px;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            background: var(--gradient-primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
        }

        .user-details h5 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .user-details p {
            font-size: 11px;
            color: var(--text-muted);
        }

        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 28px 36px;
        }

        .top-header {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 20px 32px;
            margin-bottom: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-md);
        }

        .page-title h1 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--text-primary), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page-title p {
            font-size: 13px;
            color: var(--text-muted);
        }

        .header-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .theme-toggle, .action-btn {
            padding: 10px 18px;
            border-radius: 40px;
            background: var(--bg-sidebar);
            border: 1px solid var(--border-light);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .theme-toggle:hover, .action-btn:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        .action-btn.primary {
            background: var(--gradient-primary);
            color: white;
            border: none;
        }

        .voice-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--bg-sidebar);
            border-radius: 40px;
            border: 1px solid var(--border-light);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--danger);
            position: relative;
        }

        .status-dot.active {
            background: var(--secondary);
            animation: pulse 2s infinite;
        }

        .gsheets-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--bg-sidebar);
            border-radius: 40px;
            border: 1px solid var(--border-light);
            color: var(--text-secondary);
            font-size: 12px;
        }

        .gsheets-status i {
            color: var(--primary);
        }

        /* QR Section - Enhanced */
        .qr-section {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 40px;
            margin-bottom: 30px;
            border: 1px solid var(--border-primary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 50px;
            flex-wrap: wrap;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, var(--bg-card), rgba(249,115,22,0.05));
        }

        .qr-info {
            flex: 1;
        }

        .qr-info h3 {
            font-size: 28px;
            color: var(--text-primary);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .qr-info h3 i {
            color: var(--primary);
            background: var(--primary-light);
            padding: 12px;
            border-radius: 16px;
        }

        .qr-info p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .qr-code-box {
            background: var(--bg-sidebar);
            padding: 25px;
            border-radius: 24px;
            text-align: center;
            border: 2px solid var(--primary);
            box-shadow: var(--shadow-glow);
            min-width: 220px;
        }

        .qr-code-box.hidden {
            display: none;
        }

        #qrcode {
            display: flex;
            justify-content: center;
        }

        #qrcode img {
            border-radius: 12px;
            padding: 8px;
            background: white;
        }

        .qr-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .qr-btn {
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            background: var(--bg-sidebar);
            border: 1px solid var(--border-light);
            color: var(--text-secondary);
        }

        .qr-btn.primary {
            background: var(--gradient-primary);
            color: white;
            border: none;
        }

        .qr-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        /* Form Card - Enhanced */
        .form-card {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 35px;
            border: 1px solid var(--border-light);
            position: relative;
            overflow: visible;
            transition: all 0.3s;
        }

        .form-card:hover {
            border-color: var(--border-primary);
            box-shadow: var(--shadow-glow);
        }

        .form-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            animation: shimmer 3s infinite;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-light);
        }

        .card-header i {
            font-size: 32px;
            color: var(--primary);
            background: var(--primary-light);
            padding: 14px;
            border-radius: 18px;
        }

        .card-header h3 {
            font-size: 24px;
            color: var(--text-primary);
            font-weight: 700;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .form-group label i {
            color: var(--primary);
            width: 18px;
        }

        .form-group label .required {
            color: var(--danger);
            margin-left: 4px;
        }

        .form-control, select.form-control {
            width: 100%;
            padding: 14px 18px;
            background: var(--bg-sidebar);
            border: 2px solid var(--border-light);
            border-radius: 16px;
            font-size: 14px;
            color: var(--text-primary);
            transition: all 0.3s;
        }

        .form-control:focus, select.form-control:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 4px var(--primary-light);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--gradient-success);
            color: white;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        .candidate-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .candidate-item {
            background: var(--bg-sidebar);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }

        .candidate-item:hover {
            border-color: var(--primary);
            transform: translateX(5px);
        }

        .candidate-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .candidate-avatar {
            width: 55px;
            height: 55px;
            background: var(--gradient-primary);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
        }

        .candidate-info h4 {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 5px;
        }

        .candidate-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 15px 0;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .detail-item i {
            color: var(--primary);
            width: 16px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-badge.scheduled { background: var(--info); color: white; }
        .status-badge.form { background: #8b5cf6; color: white; }
        .status-badge.checkin { background: var(--secondary); color: white; }
        .status-badge.checked-in { background: var(--secondary); color: white; }
        .status-badge.pending { background: var(--warning); color: white; }

        .action-buttons {
            display: flex;
            gap: 8px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .action-buttons .btn {
            flex: 1;
            justify-content: center;
            padding: 10px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-call {
            background: var(--info);
            color: white;
            border: none;
            border-radius: 12px;
        }

        .btn-send-hr {
            background: var(--gradient-primary);
            color: white;
            border: none;
            border-radius: 12px;
        }

        .btn-send-hr:hover, .btn-call:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        .voice-panel {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--bg-card);
            border-radius: 60px;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            border: 2px solid var(--primary);
            transform: translateY(150px);
            transition: transform 0.4s;
            z-index: 1000;
        }

        .voice-panel.active {
            transform: translateY(0);
        }

        .voice-wave {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .voice-wave span {
            width: 5px;
            height: 20px;
            background: var(--primary);
            border-radius: 5px;
            animation: wave 1s infinite;
        }

        .voice-wave span:nth-child(2) { animation-delay: 0.2s; height: 30px; }
        .voice-wave span:nth-child(3) { animation-delay: 0.4s; height: 40px; }

        @keyframes wave {
            0%, 100% { transform: scaleY(0.8); }
            50% { transform: scaleY(1.5); }
        }

        .toast-container {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 2000;
        }

        .toast {
            background: var(--bg-card);
            border-left: 4px solid var(--secondary);
            border-radius: 14px;
            padding: 14px 20px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(400px);
            transition: transform 0.3s;
            color: var(--text-primary);
        }

        .toast.show {
            transform: translateX(0);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 60px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 var(--primary-glow); }
            50% { box-shadow: 0 0 20px 5px var(--primary-glow); }
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                position: fixed;
                z-index: 200;
            }
            .main-content {
                margin-left: 0;
                padding: 20px;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
            .qr-section {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body data-theme="dark">
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <div class="sidebar-logo-icon"><i class="fas fa-clipboard-list"></i></div>
                    <div class="sidebar-logo-text">
                        <h2>BALITECH</h2>
                        <p>RECEPTION PORTAL</p>
                    </div>
                </div>
            </div>
            <div class="sidebar-nav">
                <div class="nav-section-title">MAIN</div>
                <div class="nav-item active" onclick="showDashboard()"><i class="fas fa-home"></i> Dashboard</div>
                <div class="nav-section-title">RECRUITER LEADS</div>
                <div class="nav-item" onclick="showScheduledLeads()">
                    <i class="fas fa-calendar-alt"></i> Scheduled Interviews
                    <span class="nav-badge" id="scheduledBadge">0</span>
                </div>
                <div class="nav-section-title">MESSAGES</div>
                <div class="nav-item" onclick="window.location.href='chat-portal.html'"><i class="fas fa-comments"></i> Chat</div>
            </div>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar"><i class="fas fa-user-tie"></i></div>
                    <div class="user-details">
                        <h5>Reception Desk</h5>
                        <p>reception@balitech.com</p>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content" id="mainContent"></main>
    </div>

    <div class="voice-panel" id="voicePanel">
        <div class="voice-wave"><span></span><span></span><span></span></div>
        <div class="voice-info">
            <div class="voice-name" id="voiceName">Calling...</div>
            <div class="voice-message" id="voiceMessage">Please come for interview</div>
        </div>
        <div class="voice-count" id="voiceCount">1/3</div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/portal-performance.js"></script>
    <script src="js/portal-access.js"></script>
    <script src="js/portal-session-guard.js"></script>
    <script src="js/reception-voice.js"></script>
    <script>
        // ==================== GOOGLE SHEETS CONFIGURATION ====================
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzCQLaK7VTxKcPGGpY3TeNBmfks-YjWQR-mJyZRYjLZAMZVs9y0CmvzI-JJKP-XaflRgg/exec';
        
        let recruiterLeads = [];
        let walkinCandidates = [];
        let qrGenerated = false;
        let allCandidates = [];

        // Voice: js/reception-voice.js (HR announcements polled; local Announce uses same engine)
        function initializeVoice() {
            if (window.ReceptionVoice) {
                ReceptionVoice.refreshVoices();
                ReceptionVoice.testVoice();
            }
        }

        async function loadDataFromSheet() {
            try {
                const gsheetsStatus = document.getElementById('gsheetsStatus');
                if (gsheetsStatus) {
                    gsheetsStatus.innerHTML = '<i class="fas fa-spinner fa-pulse"></i><span>Loading...</span>';
                }
                
                const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getAllCandidates`, {
                    method: 'GET',
                    mode: 'cors'
                });
                
                if (response.ok) {
                    const result = await response.json();
                    if (result.success && result.data) {
                        allCandidates = result.data;
                        console.log(`✅ Loaded ${allCandidates.length} candidates from Google Sheets`);
                        
                        if (gsheetsStatus) {
                            gsheetsStatus.innerHTML = '<i class="fas fa-check-circle"></i><span>Connected</span>';
                            setTimeout(() => {
                                if (gsheetsStatus) gsheetsStatus.innerHTML = '<i class="fas fa-cloud-upload-alt"></i><span>Ready</span>';
                            }, 2000);
                        }
                        return allCandidates;
                    }
                }
                throw new Error('Failed to fetch data');
            } catch (error) {
                console.error('Error loading from Google Sheets:', error);
                allCandidates = [];
                if (document.getElementById('gsheetsStatus')) {
                    document.getElementById('gsheetsStatus').innerHTML = '<i class="fas fa-exclamation-triangle"></i><span>Offline</span>';
                }
                return allCandidates;
            }
        }

                    fatherName: candidateData.fatherName || '',
                    phone: candidateData.phone || '',
                    email: candidateData.email || '',
                    cnic: candidateData.cnic || '',
                    city: candidateData.city || '',
                    dob: candidateData.dob || '',
                    graduation: candidateData.graduation || '',
                    position: candidateData.position || '',
                    joiningDate: candidateData.joiningDate || new Date().toISOString().split('T')[0],
                    referredBy: candidateData.referredBy || 'Walk-in',

                    hrStatus: candidateData.hrStatus || 'pending',
                    gmStatus: candidateData.gmStatus || 'pending',
                    trainingStatus: candidateData.trainingStatus || 'pending',
                    callCount: candidateData.callCount || '0'

                        id: row.leadId || row.id,
                        interviewId: row.interviewId || null,
                        name: row.fullName || row.name,
                        fullName: row.fullName || row.name,
                        fatherName: row.fatherName || '',
                        phone: row.phone || '',
                        email: row.email || '',

                        interviewDate: row.interviewDate || '',
                        interviewTime: row.interviewTime || '',
                        interviewLocation: row.interviewLocation || 'Main Office',
                        interviewer: row.interviewer || 'HR Manager',
                        recruiterName: row.recruiterName || '',

        function formatInterviewWhen(lead) {
            if (lead.interviewDateTime) {
                const raw = lead.interviewDateTime.trim();
                if (/^\d{4}-\d{2}-\d{2}/.test(raw)) {
                    const d = new Date(raw.replace(' ', 'T'));
                    if (!isNaN(d.getTime())) return d.toLocaleString();
                }
                return raw;
            }
            if (lead.queueType === 'form') return 'Form submitted — assign slot';
            return 'Date not set';
        }

        async function updateLeadStage(payload) {
            if (window.PortalFetch) PortalFetch.invalidatePipelineCaches();
            const res = await fetch('api/update_candidate_global.php', {

        async function sendToHR(candidateData, leadId = null) {
            const basePayload = {
                id: leadId || candidateData.leadId || undefined,
                phone: candidateData.phone,
                fullName: candidateData.fullName,
                fatherName: candidateData.fatherName,
                email: candidateData.email,
                cnic: candidateData.cnic,
                city: candidateData.city,
                dob: candidateData.dob,
                graduation: candidateData.graduation,
                position: candidateData.position,
                referredBy: candidateData.referredBy || 'Walk-in',
                user_role: 'Reception'
            };

            try {
                let toHr = await updateLeadStage({
                    ...basePayload,
                    new_stage: 'interview_conducted',
                    action: 'reception_send_hr',
                    remark: `Interview conducted — sent to HR queue ${new Date().toLocaleString()}`
                });
                if (!toHr.success) {
                    const checkIn = await updateLeadStage({
                        ...basePayload,
                        new_stage: 'receptionist',
                        action: 'reception_checkin',
                        remark: `Checked in at reception — slot assigned ${new Date().toLocaleString()}`
                    });
                    if (!checkIn.success) {
                        showToast(checkIn.error || toHr.error || 'Check-in failed', 'error');
                        return false;
                    }
                    const lid = checkIn.data?.lead_id || leadId;
                    toHr = await updateLeadStage({
                        ...basePayload,
                        id: lid,
                        new_stage: 'interview_conducted',
                        action: 'reception_send_hr',
                        remark: `Interview conducted — sent to HR queue ${new Date().toLocaleString()}`
                    });
                }
                if (toHr.success) {
                    showToast(`✅ ${candidateData.fullName} sent to HR interview queue`, 'success');
                    await mirrorCandidateToSheet({ ...candidateData, status: 'interview_conducted' }, 'reception_send_to_hr');
                    return true;
                }
                showToast(toHr.error || 'Failed to send to HR', 'error');
            } catch (e) {
                showToast('Failed to save candidate to database', 'error');
            }
            return false;
        }

        async function submitWalkin() {
            const fullName = document.getElementById('walkinName')?.value?.trim();
            const fatherName = document.getElementById('walkinFather')?.value?.trim();
            const phone = document.getElementById('walkinPhone')?.value?.trim();
            const email = document.getElementById('walkinEmail')?.value?.trim();
            const cnic = document.getElementById('walkinCnic')?.value?.trim();
            const city = document.getElementById('walkinCity')?.value?.trim();
            const dob = document.getElementById('walkinDob')?.value;
            const qualification = document.getElementById('walkinQualification')?.value;
            const position = document.getElementById('walkinPosition')?.value;
            const referredBy = document.getElementById('walkinReferredBy')?.value || 'Walk-in';

            if (!fullName || !fatherName || !phone || !position) {
                showToast('Please fill all required fields (*)', 'error');
                return;
            }

            if (!/^\d{11}$/.test(phone)) {
                showToast('Please enter 11-digit phone number', 'error');
                return;
            }

            const normalizedPhone = phone.replace(/\D/g, '');
            const matchedScheduled = recruiterLeads.find(l => (String(l.phone || '').replace(/\D/g, '') === normalizedPhone));

            const candidateForHR = {
                id: Date.now(),
                fullName: fullName,
                fatherName: fatherName,
                phone: phone,
                email: email || '',
                cnic: cnic || '',
                city: city || '',
                dob: dob || '',
                graduation: qualification || '',
                position: position,
                joiningDate: new Date().toISOString().split('T')[0],
                referredBy: referredBy,
                source: 'walkin',
                registeredAt: new Date().toISOString()
            };

            if (matchedScheduled && matchedScheduled.id) {
                await sendToHR({ ...candidateForHR, leadId: matchedScheduled.id }, matchedScheduled.id);
                showToast(`Matched scheduled interview for ${matchedScheduled.fullName || matchedScheduled.name} by phone`, 'success');
                await loadData();
                return;
            }

            walkinCandidates.push({ ...candidateForHR, registeredAt: new Date().toISOString() });
            await sendToHR(candidateForHR);
            await loadData();
            
            document.getElementById('walkinName').value = '';
            document.getElementById('walkinFather').value = '';
            document.getElementById('walkinPhone').value = '';
            document.getElementById('walkinEmail').value = '';
            document.getElementById('walkinCnic').value = '';
            document.getElementById('walkinCity').value = '';
            document.getElementById('walkinDob').value = '';
            document.getElementById('walkinQualification').value = '';
            document.getElementById('walkinPosition').value = '';
            document.getElementById('walkinReferredBy').value = 'Walk-in';
            
            loadData();
            showDashboard();
        }

                new QRCode(qrDiv, {
                    text: mobileUrl,
                    width: 160,
                    height: 160,
                    colorDark: "#f97316",

                    correctLevel: QRCode.CorrectLevel.H
                });
                qrGenerated = true;
            }
            display.classList.remove('hidden');

                </div>

                <div class="stats-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; margin-bottom: 32px;">
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-calendar-alt"></i></div>
                        <div class="stat-value" id="statTotalCount">${recruiterLeads.length}</div>
                        <div class="stat-label">Total in Queue</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-user-clock"></i></div>
                        <div class="stat-value" id="statScheduledCount">0</div>
                        <div class="stat-label">Scheduled Interviews</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-mobile-alt"></i></div>
                        <div class="stat-value" id="statFormCount">0</div>
                        <div class="stat-label">Form Applications</div>
                    </div>
                </div>

                <div class="form-card" style="padding: 25px;">
                    <div class="card-header">
                        <i class="fas fa-list"></i>
                        <h3>All Scheduled Interviews</h3>
                    </div>
                    <div class="candidate-list" id="scheduledLeadsList"></div>
                </div>
            `;
            document.getElementById('mainContent').innerHTML = html;
            renderScheduledList();

            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.querySelector('.nav-item[onclick="showScheduledLeads()"]').classList.add('active');
        }

        async function sendScheduledToHR(id, name, phone, position) {
            const lead = recruiterLeads.find(l => l.id === id);
            if (!lead) return;

            const candidateForHR = {
                leadId: id,
                fullName: name,
                fatherName: lead.fatherName || '',
                phone: phone,
                email: lead.email || '',
                cnic: lead.cnic || '',
                city: lead.city || '',
                dob: lead.dob || '',
                graduation: lead.graduation || '',
                position: position,
                referredBy: lead.referredBy || 'Recruiter',
                source: 'recruiter'
            };

            const ok = await sendToHR(candidateForHR, id);
            if (ok) {
                try {
                    if (lead.interviewId) {
                        await fetch('api/complete_interview.php', {
                            method: 'POST',
                            credentials: 'include',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ interview_id: lead.interviewId })
                        });
                    }
                } catch (e) {
                    console.warn('Interview completion sync skipped', e);
                }
                await loadData();
                showScheduledLeads();
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme') || 'dark';
            const newTheme = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);

        loadData();
        showDashboard();

        if (window.ReceptionVoice) {
            ReceptionVoice.refreshVoices();
            ReceptionVoice.startHrVoicePoller(2500);
        }
        
        if (window.PortalPoll) {
            PortalPoll.start('reception-queue', async () => {
                await loadData();
                const badge = document.getElementById('scheduledBadge');
                if (badge) badge.textContent = recruiterLeads.length;
                if (document.getElementById('scheduledLeadsList')) {
                    renderScheduledList();
                }
            }, 25000, { pauseWhenHidden: true });
        }

        window.showDashboard = showDashboard;
        window.showScheduledLeads = showScheduledLeads;
        window.callCandidate = callCandidate;
        window.initializeVoice = initializeVoice;
        window.toggleTheme = toggleTheme;
        window.submitWalkin = submitWalkin;
        window.showQRCode = showQRCode;
        window.copyMobileLink = copyMobileLink;
        window.downloadQRCode = downloadQRCode;
        window.forceSync = forceSync;
        window.verifySync = verifySync;
        window.showSyncStats = showSyncStats;
        window.logout = logout;
        window.sendScheduledToHR = sendScheduledToHR;
        window.testVoice = testVoice;
    </script>
    <script src="js/portal-chat-fab.js"></script>
</body>
</html>
